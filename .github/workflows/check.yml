---

# This workflow will do a clean install of all dependencies, cache/restore
# them, check for linting, formatting, and type errors, build the package
# and run tests across different versions/interpreters.

name: "Check CI"

on:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: "ubuntu-latest"

    strategy:
      matrix:
        python-interpreter: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: "Setup Python"
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: ${{ matrix.python-interpreter }}
          cache: true
      - name: "Install dependencies"
        run: "pdm install --dev"

      - name: "Check formatting"
        run: "pdm run ruff format --check"

      - name: "Linting"
        run: "pdm run ruff check"

      - name: "Type checking"
        run: "pdm run mypy --strict ."

      - name: "Tests"
        run: "pdm run pytest --cov-report term --cov taturtle --cov-branch --cov-fail-under=30"
